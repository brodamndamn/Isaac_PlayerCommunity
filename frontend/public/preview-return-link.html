<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>返回链接位置演示</title>
<style>
  body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f5; }
  .wrap { max-width: 960px; margin: 0 auto; background: #fff; min-height: 100vh; }

  /* 模拟 App.tsx 的 header（已存在，用户保留） */
  header {
    padding: 0 24px;
    height: 56px;
    background: #1a0a00;
    display: flex;
    align-items: center;
    gap: 24px;
    border-bottom: 2px solid #6b3a2a;
  }
  header .brand { color: #eee; font-weight: 600; font-size: 18px; }
  header a.nav { color: #ccc; text-decoration: none; font-size: 14px; }

  /* 模拟 main（已存在） */
  main {
    max-width: 960px;
    margin: 0 auto;
    padding: 24px;
    position: relative;
    box-sizing: border-box;
  }

  /* 返回链接：absolute 浮动，浮在 main padding 区域左上角 */
  .homeBtn {
    position: absolute;
    top: 8px;
    left: 24px;
    font-size: 15px;
    font-weight: 600;
    color: #5c4033;
    border: none;
    background: none;
    cursor: pointer;
    padding: 0;
    font-family: inherit;
    text-decoration: none;
    transition: color 0.15s;
  }
  .homeBtn:hover { color: #c0392b; }

  /* 主内容（h1 + grid） */
  h1.title { font-size: 24px; margin: 0 0 16px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; margin-top: 16px; }
  .card {
    border: 1px solid #e0e0e0;
    border-left: 4px solid #1565c0;
    border-radius: 8px;
    padding: 16px;
    background: #fafafa;
  }
  .card h3 { margin: 0 0 6px; font-size: 16px; }
  .card p { margin: 0; font-size: 13px; color: #666; }

  /* 说明标签（演示用，实际页面没有） */
  .annotate {
    background: #fff3cd;
    border-left: 3px solid #ffc107;
    padding: 8px 12px;
    font-size: 12px;
    color: #856404;
    margin: 8px 0;
    border-radius: 0 4px 4px 0;
  }

  .footer { text-align: center; padding: 16px; font-size: 13px; color: #999; border-top: 1px solid #eee; margin-top: 40px; }
</style>
</head>
<body>
  <div class="wrap">
    <!-- App.tsx 已有的 header（保留） -->
    <header>
      <a href="/" class="brand">ISAAC 玩家社区</a>
      <a href="/items" class="nav">道具</a>
      <a href="/characters" class="nav">角色</a>
      <a href="/endings" class="nav">结局</a>
    </header>

    <!-- main：返回链接浮在 padding 区域左上角 -->
    <main>
      <a href="/" class="homeBtn">返回首页</a>

      <div class="annotate">
        ↑ "返回首页" 浮在 main padding 区域左上角（绝对定位，不占空间，不挤压下方 h1）<br>
        ISAAC 玩家社区标题正下方 → main 左上角 padding 区
      </div>

      <h1 class="title">道具图鉴</h1>

      <div class="grid">
        <div class="card"><h3>伤心洋葱</h3><p>+0.7 射速提升</p></div>
        <div class="card"><h3>内眼</h3><p>三向射击</p></div>
        <div class="card"><h3>九命</h3><p>额外 8 条命</p></div>
        <div class="card"><h3>妈刀</h3><p>妈妈的爱（刃）</p></div>
        <div class="card"><h3>硫磺火</h3><p>蓄力激光</p></div>
        <div class="card"><h3>圣心</h3><p>追踪 + 伤害</p></div>
      </div>
    </main>

    <div class="footer">游戏图片版权 © Edmund McMillen / Nicalis</div>
  </div>
</body>
</html>
